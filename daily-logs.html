<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Daily Logs</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/app.css"></head><body><div id="app"></div><script src="assets/app.js"></script><script>(async()=>{const logs=await MissionControl.loadJson('./data/daily-logs.json',[]); document.getElementById('app').innerHTML = MissionControl.shell({active:'daily-logs.html',title:'Daily logs',subtitle:'Latest 20 daily logs, summary first, full file on expand.'}, `<section class="card"><div class="section-title"><h2>Daily log summary</h2><span class="pill">Latest 20</span></div><div class="log-list">${logs.slice().reverse().map(log=>`<details class="log-item"><summary class="log-summary"><div><div class="log-date">${MissionControl.esc(log.date)}</div><div class="log-preview">${MissionControl.esc(log.summary||'No summary available.')}</div></div><span class="pill">Expand</span></summary><pre class="log-content">${MissionControl.esc(log.content||'')}</pre></details>`).join('') || '<div class="muted">No daily logs found.</div>'}</div></section>`);})();</script></body></html>
