<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Mission Control</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/app.css"></head><body><div id="app"></div><script src="assets/app.js"></script><script>(async()=>{const data=await MissionControl.loadJson('./data/operating-board.json',{backlog:[],inProgress:[],inReview:[],completed:[],blocked:[]}); const renderCol=(title,key)=>`<div class="col"><h3>${title}</h3>${(data[key]||[]).map(t=>`<div class="item">${MissionControl.esc(t.title)}<small>${MissionControl.esc(t.description)}</small></div>`).join('') || '<div class="muted">No items.</div>'}</div>`; document.getElementById('app').innerHTML = MissionControl.shell({active:'mission-control.html',title:'Mission Control',subtitle:'Operating board using the KANBAN.md structure, backlog, in progress, in review, completed, blocked.',foot:'This page is now powered by a shared operating board data source.'}, `<section class="page-stack"><section class="card"><div class="section-title"><h2>Operating approach</h2><span class="pill">From KANBAN.md</span></div><div class="list"><li><strong>Backlog</strong>, agreed work waiting to be actioned</li><li><strong>In Progress</strong>, active work right now</li><li><strong>In Review</strong>, awaiting decision, feedback, or approval</li><li><strong>Completed</strong>, finished and logged</li><li><strong>Blocked</strong>, needs Niall or an external dependency</li></div></section><section class="kanban">${renderCol('Backlog','backlog')}${renderCol('In Progress','inProgress')}${renderCol('In Review','inReview')}${renderCol('Completed','completed')}${renderCol('Blocked','blocked')}</section></section>`);})();</script></body></html>
