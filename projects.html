<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Projects</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/app.css"></head><body><div id="app"></div><script src="assets/app.js"></script><script>(async()=>{const data=await MissionControl.loadJson('./data/operating-board.json',{backlog:[],inProgress:[],inReview:[],completed:[],blocked:[]}); const renderCol=(title,key)=>`<div class="col"><div class="section-title" style="margin-bottom:12px;"><h3>${title}</h3><span class="pill">Shared</span></div><div class="project-list">${(data[key]||[]).map(t=>`<article class="project-card"><div class="project-top"><div class="project-title">${MissionControl.esc(t.title)}</div><span class="priority-badge priority-${MissionControl.esc(t.priority)}">${MissionControl.esc(t.priority)}</span></div><div class="project-preview">${MissionControl.esc(t.description)}</div><div class="project-meta"><span>${MissionControl.esc(t.created||'')}</span><span>${MissionControl.esc(t.category || 'Project')}</span></div></article>`).join('') || '<div class="muted">No tasks yet.</div>'}</div></div>`; document.getElementById('app').innerHTML = MissionControl.shell({active:'projects.html',title:'Projects',subtitle:'Project queue broken down using the same shared operating board as Mission Control.'}, `<section class="page-stack"><section class="card"><div class="section-title"><h2>Projects operating board</h2><span class="pill">Shared source</span></div><div class="list"><li><strong>Backlog</strong>, agreed but not actioned yet</li><li><strong>In Progress</strong>, active build or launch work</li><li><strong>In Review</strong>, waiting for decision, feedback, or refinement</li><li><strong>Completed</strong>, done and logged</li><li><strong>Blocked</strong>, cannot progress without a dependency or decision</li></div></section><section class="card"><div class="section-title"><h2>Projects</h2><span class="pill">Repo-backed</span></div><div class="kanban">${renderCol('Backlog','backlog')}${renderCol('In Progress','inProgress')}${renderCol('In Review','inReview')}${renderCol('Completed','completed')}${renderCol('Blocked','blocked')}</div></section></section>`);})();</script></body></html>
