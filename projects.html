<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Projects</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/app.css"></head><body><div id="app"></div><script src="assets/app.js"></script><script>(async()=>{const data=await MissionControl.loadJson('./data/projects.json',{backlog:[],inProgress:[],done:[]}); const renderCol=(title,key)=>`<div class="col"><div class="section-title" style="margin-bottom:12px;"><h3>${title}</h3><span class="pill">Shared</span></div><div class="project-list">${(data[key]||[]).map(t=>`<article class="project-card"><div class="project-top"><div class="project-title">${MissionControl.esc(t.title)}</div><span class="priority-badge priority-${MissionControl.esc(t.priority)}">${MissionControl.esc(t.priority)}</span></div><div class="project-preview">${MissionControl.esc(t.description)}</div><div class="project-meta"><span>${MissionControl.esc(t.created||'')}</span><span>Repo-backed shared view</span></div></article>`).join('') || '<div class="muted">No tasks yet.</div>'}</div></div>`; document.getElementById('app').innerHTML = MissionControl.shell({active:'projects.html',title:'Projects',subtitle:'Shared repo-backed Kanban across devices.'}, `<section class="card"><div class="section-title"><h2>Projects</h2><span class="pill">Repo-backed</span></div><div class="kanban projects-board-3">${renderCol('Backlog','backlog')}${renderCol('In Progress','inProgress')}${renderCol('Done','done')}</div></section>`);})();</script></body></html>
