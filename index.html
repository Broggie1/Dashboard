<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Mission Control</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/app.css"></head><body><div id="app"></div><script src="assets/app.js"></script><script>(async()=>{const summary=await MissionControl.loadJson('./data/summary.json',{}); const agents=await MissionControl.loadJson('./data/agents.json',[]); const activity=await MissionControl.loadJson('./data/activity.json',[]); const statusCounts={red:0,amber:0,green:0}; agents.forEach(a=>statusCounts[a.status]=(statusCounts[a.status]||0)+1); document.getElementById('app').innerHTML = MissionControl.shell({active:'index.html',title:'Control',subtitle:'Executive summary only. Fast scan of what matters now.',foot:'Summary homepage only. Detailed content lives on separate pages.'}, `
<section class="hero"><div><div class="eyebrow">Mission Control • Niall</div><h1>Personal command centre for life, revenue, and product execution.</h1><p class="sub">Executive summary page only. Use the left nav for Agents, Projects, Daily Logs, Revenue, Governance, Pipeline, Blockers, and Links.</p></div><div class="hero-side"><div class="mini"><div class="label">Current time</div><div class="value" id="clock">Loading...</div></div><div class="mini"><div class="label">System status</div><div class="value">${MissionControl.esc(summary.systemStatus || 'Operational')}</div></div><div class="mini"><div class="label">Primary goal</div><div class="value">${MissionControl.esc(summary.primaryGoal || '£20,000 passive income in 3 months')}</div></div></div></section>
<section class="grid metrics"><div class="card"><div class="label">Ideas</div><div class="metric-value">${MissionControl.esc(summary.metrics?.ideas ?? 0)}</div><div class="metric-foot">Top of funnel opportunities being reviewed</div></div><div class="card"><div class="label">Research</div><div class="metric-value">${MissionControl.esc(summary.metrics?.research ?? 0)}</div><div class="metric-foot">Validated concept in active research</div></div><div class="card"><div class="label">Launch</div><div class="metric-value">${MissionControl.esc(summary.metrics?.launch ?? 0)}</div><div class="metric-foot">Mission Control and TaxReady are in launch lane</div></div><div class="card"><div class="label">MRR</div><div class="metric-value">${MissionControl.esc(summary.metrics?.mrr ?? '£0')}</div><div class="metric-foot">Revenue tracking baseline</div></div></section>
<section class="grid two-col"><div class="card"><div class="section-title"><h2>Current priorities</h2><span class="pill status-warn">Execution</span></div><div class="list">${(summary.priorities||[]).map(item=>`<li>${MissionControl.esc(item)}</li>`).join('')}</div></div><div class="card"><div class="section-title"><h2>Quick status</h2><span class="pill status-good">Pages live</span></div><div class="kpi-grid"><div class="kpi"><div class="label">Hosting</div><div class="value">${MissionControl.esc(summary.quickStatus?.hosting || 'GitHub Pages')}</div></div><div class="kpi"><div class="label">Primary model</div><div class="value">${MissionControl.esc(summary.quickStatus?.primaryModel || 'GPT 5.4')}</div></div><div class="kpi"><div class="label">Projects</div><div class="value">${MissionControl.esc(summary.quickStatus?.projects || 'Repo-backed')}</div></div><div class="kpi"><div class="label">Refresh</div><div class="value">${MissionControl.esc(summary.quickStatus?.refresh || '2-hour job')}</div></div></div></div></section>
<section class="grid two-col"><div class="card"><div class="section-title"><h2>Agent summary</h2><span class="pill">${agents.length} tracked</span></div><div class="kpi-grid"><div class="kpi"><div class="label">Busy</div><div class="value"><span class="status-dot dot-red"></span>${statusCounts.red || 0}</div></div><div class="kpi"><div class="label">Thinking</div><div class="value"><span class="status-dot dot-amber"></span>${statusCounts.amber || 0}</div></div><div class="kpi"><div class="label">Available</div><div class="value"><span class="status-dot dot-green"></span>${statusCounts.green || 0}</div></div><div class="kpi"><div class="label">Agents tab</div><div class="value"><a href="agents.html">Open page</a></div></div></div></div><div class="card"><div class="section-title"><h2>Recent activity</h2><span class="pill">Latest</span></div><div class="activity-list">${activity.map(item=>`<article class="activity-item"><div class="activity-time">${MissionControl.esc(item.time)}</div><div class="activity-title">${MissionControl.esc(item.title)}</div><div class="project-preview">${MissionControl.esc(item.detail)}</div></article>`).join('')}</div></div></section>`); MissionControl.tickClock();})();</script></body></html>
