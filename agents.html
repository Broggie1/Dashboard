<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Agents</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/app.css"></head><body><div id="app"></div><script src="assets/app.js"></script><script>(async()=>{const agents=await MissionControl.loadJson('./data/agents.json',[]); const count={red:0,amber:0,green:0}; agents.forEach(a=>count[a.status]=(count[a.status]||0)+1); const statusDot=(s)=>s==='red'?'dot-red':s==='amber'?'dot-amber':'dot-green'; document.getElementById('app').innerHTML = MissionControl.shell({active:'agents.html',title:'Agents',subtitle:'Dedicated agent control page with clear status, task, model, and workstream visibility.',foot:'Red = busy, amber = thinking, green = available.'}, `<section class="page-stack"><section class="card"><div class="section-title"><h2>Agent summary</h2><span class="pill">First-class tab</span></div><div class="agent-summary-grid"><div class="agent-summary-card"><div class="label">Busy</div><div class="agent-summary-value"><span class="status-dot dot-red"></span>${count.red||0}</div></div><div class="agent-summary-card"><div class="label">Thinking</div><div class="agent-summary-value"><span class="status-dot dot-amber"></span>${count.amber||0}</div></div><div class="agent-summary-card"><div class="label">Available</div><div class="agent-summary-value"><span class="status-dot dot-green"></span>${count.green||0}</div></div><div class="agent-summary-card"><div class="label">Tracked agents</div><div class="agent-summary-value">${agents.length}</div></div></div></section><section class="card"><div class="section-title"><h2>Agent status</h2><span class="pill">RAG status model</span></div><div class="agent-grid">${agents.map(agent=>`<article class="agent-card"><div class="agent-head"><div><div class="agent-name">${MissionControl.esc(agent.name)}</div><div class="agent-status-line"><span class="status-dot ${statusDot(agent.status)}"></span>${MissionControl.esc(agent.statusLabel)}</div></div><span class="pill status-${agent.status==='red'?'bad':agent.status==='amber'?'warn':'good'}">${MissionControl.esc(agent.workstream)}</span></div><div class="agent-task">${MissionControl.esc(agent.task)}</div><div class="project-preview">${MissionControl.esc(agent.summary || '')}</div><div class="agent-meta"><div class="kpi"><div class="label">Last active</div><div class="value">${MissionControl.esc(agent.lastActive)}</div></div><div class="kpi"><div class="label">Model</div><div class="value">${MissionControl.esc(agent.model)}</div></div></div></article>`).join('')}</div></section></section>`);})();</script></body></html>
